<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#faf8ef" />
    <meta name="description" content="2048 New Era — 经典 2048 游戏的现代重制版" />
    <script>
      ;(() => {
        const baseUrl = '%BASE_URL%'
        const isUnbuiltSource = baseUrl.includes('BASE_URL')
        const isGitHubPages = window.location.hostname.endsWith('github.io')
        if (isUnbuiltSource && isGitHubPages) {
          window.location.replace(new URL('fallback/', window.location.href))
        }
      })()
    </script>
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <title>2048 New Era</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
